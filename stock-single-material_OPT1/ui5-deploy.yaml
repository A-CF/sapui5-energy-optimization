# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: ui.s2p.mm.stock.overview.opt1
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        log: 5
        target:
          url: https://z10lp1.ucc.in.tum.de:8100
          client: '300'
        credentials:
          username: env:FIORI_TOOLS_USER
          password: env:FIORI_TOOLS_PASSWORD
        app:
          name: Z_OPT1_STOCKOVE
          description: ''
          package: Z_00_AWA
          transport: Z10K900028
        exclude:
          - /test/
