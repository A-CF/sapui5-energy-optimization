specVersion: "3.1"
metadata:
  name: ui.s2p.mm.lib.slonomo.mat.ori
type: application
framework:
  name: SAPUI5
  version: 1.136.0
  libraries:
    - name: sap.ui.core
    - name: sap.m
    - name: sap.ui.generic.app
    - name: sap.suite.ui.generic.template
    - name: sap.ui.comp
    - name: sap.chart
    - name: sap.viz
    - name: sap.suite.ui.microchart
    - name: sap.ushell
    - name: sap.f
    - name: sap.ui.table
    - name: themelib_sap_belize
    - name: themelib_sap_bluecrystal
    - name: themelib_sap_fiori_3
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        backend:
          - path: /sap
            url: https://z10lp1.ucc.in.tum.de:8100
            client: "300"
            destination: Z10_UCC
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: ui.s2p.mm.lib.slonomo.mat.ori
        ui5Theme: sap_fiori_3
